<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Quarterdeck — Your Executive Command Centre</title>
  <meta name="description" content="Quarterdeck is a powerful productivity app for iPhone, iPad, and Mac. Tasks, notes, finance, code snippets, agenda, and projects — all in one place."/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #0C1538; color: #E2E8F0;
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; padding: 2rem;
    }
    .logo {
      width: 96px; height: 96px; border-radius: 22px;
      background: linear-gradient(135deg, #1A2E70, #0C1538);
      display: flex; align-items: center; justify-content: center;
      font-size: 2.5rem; margin: 0 auto 1.5rem;
      box-shadow: 0 8px 32px rgba(255,180,60,0.25), 0 0 0 1px rgba(255,180,60,0.15);
    }
    h1 { font-size: 2.4rem; font-weight: 700; color: #fff; }
    .tagline { color: #A78BFA; font-size: .95rem; font-weight: 600; margin-top: .35rem; letter-spacing: .05em; text-transform: uppercase; }
    p  { color: #94A3B8; margin-top: .75rem; font-size: 1.05rem; max-width: 480px; }
    .badges { display: flex; gap: .8rem; justify-content: center; margin-top: 2rem; flex-wrap: wrap; }
    .badge {
      padding: .5rem 1.2rem; border-radius: 999px;
      font-size: .85rem; font-weight: 600;
      border: 1px solid rgba(255,180,60,.35);
      color: #FFDA70; background: rgba(255,180,60,.08);
    }
    footer { margin-top: 3rem; color: #475569; font-size: .8rem; }
    footer a { color: #A78BFA; text-decoration: none; }
    footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="logo">⚓</div>
  <h1>Quarterdeck</h1>
  <p class="tagline">Command from the bridge</p>
  <p>Your executive command centre. Tasks, notes, finance, code snippets, agenda, and projects — all in one beautifully designed app.</p>
  <div class="badges">
    <span class="badge">iPhone &amp; iPad</span>
    <span class="badge">Mac</span>
    <span class="badge">iCloud Sync</span>
    <span class="badge">AI Insights</span>
  </div>
  <footer>
    <a href="/quarterdeck/privacy">Privacy Policy</a>
    &nbsp;·&nbsp;
    <a href="mailto:dyland71@live.com">Contact</a>
  </footer>
</body>
</html>
